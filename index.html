<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NCC Roma Premium - Fabio Cavalieri</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #0b0b0b;
    color: #fff;
}

/* NAV */
nav {
    position: fixed;
    width: 100%;
    background: rgba(0,0,0,0.8);
    padding: 15px;
    text-align: center;
    z-index: 999;
}

nav a {
    margin: 0 15px;
    color: #fff;
    text-decoration: none;
}

/* HERO */
.hero {
    height: 100vh;
    background: linear-gradient(rgba(0,0,0,0.7),rgba(0,0,0,0.7)),
    url('https://images.unsplash.com/photo-1549924231-f129b911e442') center/cover;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
}

.hero h1 {
    font-size: 50px;
}

.btn {
    padding: 15px 30px;
    background: gold;
    color: black;
    border-radius: 30px;
    text-decoration: none;
    font-weight: bold;
}

/* SECTION */
section {
    padding: 80px 20px;
    text-align: center;
}

/* SERVIZI */
.services {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 30px;
}

.service {
    background: #111;
    padding: 30px;
    border-radius: 15px;
    width: 280px;
    border: 1px solid #333;
    transition: 0.3s;
}

.service:hover {
    transform: translateY(-10px);
    border-color: gold;
}

/* FORM */
form {
    max-width: 400px;
    margin: auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

input, select, button {
    padding: 12px;
    border-radius: 10px;
    border: none;
}

button {
    background: gold;
    color: black;
    font-weight: bold;
}

/* FOOTER */
footer {
    background: black;
    padding: 20px;
}
</style>
</head>

<body>

<nav>
    <a href="#">Home</a>
    <a href="#servizi">Servizi</a>
    <a href="#prenota">Prenota</a>
</nav>

<div class="hero">
    <div>
        <h1>🚘 NCC Roma Premium</h1>
        <p>Trasporti di lusso, comfort e puntualità</p>
        <a class="btn" href="https://wa.me/393895009266">Prenota Ora</a>
    </div>
</div>

<section id="servizi">
    <h2>Servizi Premium</h2>

    <div class="services">
        <div class="service">✈️ Transfer Aeroporti</div>
        <div class="service">🚢 Porto Civitavecchia</div>
        <div class="service">🏨 Hotel e Business</div>
    </div>
</section>

<section>
    <h2>💰 Calcola il prezzo</h2>

    <select id="tratta">
        <option value="">Seleziona tratta</option>
        <option value="50">Roma → Fiumicino (€50)</option>
        <option value="60">Roma → Civitavecchia (€60)</option>
    </select>

    <p id="prezzo"></p>
</section>

<section id="prenota">
    <h2>Prenota il tuo servizio</h2>

    <form action="https://formsubmit.co/d269fccd49716a87c1022551ad1ce9c0" method="POST">

        <input type="text" name="Nome" placeholder="Nome" required>
        <input type="text" name="Cognome" placeholder="Cognome" required>
        <input type="email" name="Email" placeholder="Email" required>
        <input type="tel" name="Telefono" placeholder="Telefono" required>

        <input type="date" name="Data" required>
        <input type="time" name="Ora" required>

        <input type="hidden" name="_captcha" value="false">
        <input type="hidden" name="_subject" value="🚗 Nuova prenotazione NCC">
        <input type="hidden" name="_template" value="table">

        <button type="submit">Invia richiesta</button>
    </form>
</section>

<footer>
    <p>📧 fabio.cavalieri@libero.it</p>
    <p id="datetime"></p>
</footer>

<!-- WhatsApp -->
<a href="https://wa.me/393895009266"
   style="position:fixed; bottom:20px; right:20px; background:#25D366; color:white;
   padding:15px 20px; border-radius:50px; text-decoration:none;">
   💬
</a>

<script>
document.getElementById("tratta").addEventListener("change", function() {
    document.getElementById("prezzo").innerText =
        this.value ? "Prezzo: €" + this.value : "";
});

setInterval(() => {
    document.getElementById("datetime").innerText =
        new Date().toLocaleString("it-IT");
}, 1000);
</script>

</body>
</html>
